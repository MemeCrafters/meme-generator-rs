version: "1.0"

metadata:
  key: "capoo_rub"
  keywords: ["咖波蹭", "咖波贴"]
  tags: ["猫猫虫", "咖波"]
  date_created: "2022-11-29"
  date_modified: "2023-02-14"
  params:
    min_images: 1
    max_images: 1

resources:
  frames:
    pattern: "capoo_rub/{index}.png"
    count: 4

frames:
  count: 4
  duration: 0.1
  vars:
    size:
      type: "number[2]"
      values:
        - [178, 184]
        - [178, 174]
        - [178, 174]
        - [178, 178]
    pos:
      type: "number[2]"
      values:
        - [78, 260]
        - [84, 269]
        - [84, 269]
        - [84, 264]

elements:
  avatar:
    type: image
    from: input.images[0]
    scope: dynamic
    operations:
      - square
      - resize_exact: frames.size

canvas:
  size: resources.frames[0].size
  background: white

layers:
  - use: elements.avatar
    position: frames.pos
  - use: resources.frames[frames.index]
