version: "1.0"

metadata:
  key: "call_110"
  keywords: ["遇到困难请拨打"]
  date_created: "2022-05-22"
  date_modified: "2023-02-14"
  params:
    min_images: 2
    max_images: 2

config:
  gif_input: true

elements:
  avatar1:
    type: image
    from: input.images[0]
    scope: dynamic
    operations:
      - square
      - resize_exact: [250, 250]
  avatar2:
    type: image
    from: input.images[1]
    scope: dynamic
    operations:
      - square
      - resize_exact: [250, 250]
  text:
    type: text
    text: "遇到困难请拨打"
    font_size: 100
    bound: [900, 200]

canvas:
  size: [900, 500]
  background: white

layers:
  - use: elements.text
    position: [0, 0]
  - use: elements.avatar2
    position: [50, 200]
  - use: elements.avatar2
    position: [325, 200]
  - use: elements.avatar1
    position: [600, 200]
