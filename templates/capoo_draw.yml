elements:
  avatar:
    type: image
    from: input.images[0]
    scope: dynamic
    operations:
      - resize_fit: { size: [175, 120], fit: cover }
      - op: perspective
        args: frames.points
        if: frames.index >= 6

canvas:
  size: resources.frames[0].size
  background: white

layers:
  - use: elements.avatar
    position: frames.pos
    if: frames.index >= 6
  - use: resources.frames[frames.frame_idx]
