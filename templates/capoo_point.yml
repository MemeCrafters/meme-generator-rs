version: "1.0"

metadata:
  key: "capoo_point"
  keywords: ["咖波指"]
  tags: ["猫猫虫", "咖波"]
  date_created: "2024-10-24"
  date_modified: "2024-10-24"
  params:
    min_images: 1
    max_images: 1

resources:
  frames:
    pattern: "capoo_point/{index}.png"
    count: 4

frames:
  count: 4
  duration: 0.1
  vars:
    size:
      type: "number[2]"
      values:
        - [165, 167]
        - [165, 167]
        - [160, 165]
        - [165, 167]
    pos:
      type: "number[2]"
      values:
        - [57, 290]
        - [53, 290]
        - [57, 293]
        - [56, 290]

elements:
  avatar:
    type: image
    from: input.images[0]
    scope: dynamic
    operations:
      - square
      - resize_exact: frames.size

canvas:
  size: resources.frames[0].size
  background: white

layers:
  - use: elements.avatar
    position: frames.pos
  - use: resources.frames[frames.index]
