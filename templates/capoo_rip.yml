elements:
  whole_img:
    type: image
    from: input.images[0]
    scope: dynamic
    if: frames.index < 12
    operations:
      - resize_fit: { size: [150, 100], fit: cover }
      - perspective: frames.points
  left_img:
    type: image
    from: input.images[0]
    scope: dynamic
    if: frames.index >= 12
    operations:
      - resize_fit: { size: [150, 100], fit: cover }
      - crop: [0, 0, 75, 100]
      - perspective: frames.left_points
  right_img:
    type: image
    from: input.images[0]
    scope: dynamic
    if: frames.index >= 12
    operations:
      - resize_fit: { size: [150, 100], fit: cover }
      - crop: [75, 0, 150, 100]
      - perspective: frames.right_points

canvas:
  size: resources.frames[0].size
  background: white

layers:
  - use: elements.whole_img
    position: frames.pos
    if: frames.index < 12
  - use: elements.left_img
    position: frames.left_pos
    if: frames.index >= 12
  - use: elements.right_img
    position: frames.right_pos
    if: frames.index >= 12
  - use: resources.frames[frames.frame_idx]
