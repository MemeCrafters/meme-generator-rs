version: "1.0"

metadata:
  key: "applaud"
  keywords: ["鼓掌"]
  date_created: "2023-01-08"
  date_modified: "2023-02-14"
  params:
    min_images: 1
    max_images: 1

resources:
  frames:
    pattern: "applaud/{index}.png"
    count: 5

frames:
  count: 5
  duration: 0.1
  vars:
    size:
      type: "number[2]"
      values:
        - [109, 102]
        - [107, 105]
        - [110, 106]
        - [109, 106]
        - [107, 108]
    pos:
      type: "number[2]"
      values:
        - [27, 17]
        - [28, 15]
        - [27, 14]
        - [27, 14]
        - [29, 12]

elements:
  avatar:
    type: image
    from: input.images[0]
    scope: dynamic
    operations:
      - square
      - resize_exact: frames.size

canvas:
  size: resources.frames[0].size
  background: white

layers:
  - use: elements.avatar
    position: frames.pos
  - use: resources.frames[frames.index]
